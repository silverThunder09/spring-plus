<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채팅 테스트</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

        :root {
            --bg: #0a0e27;
            --surface: #151a33;
            --surface2: #1e2542;
            --border: #2a3150;
            --text: #e8eaed;
            --text-muted: #8b92b0;
            --blue: #4c9aff;
            --green: #36b37e;
            --red: #ff5630;
            --yellow: #ffab00;
            --purple: #6554c0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'IBM Plex Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ─── LAYOUT ─── */
        .container {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
        }

        /* ─── SIDEBAR ─── */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 12px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--red);
            animation: pulse 2s infinite;
        }
        .status-dot.connected {
            background: var(--green);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .user-select {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }
        .user-select label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }
        .user-select select {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: 'IBM Plex Sans KR', sans-serif;
        }
        .user-select select:focus {
            outline: none;
            border-color: var(--blue);
        }

        .room-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .room-list h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 12px;
            font-weight: 600;
        }
        .room-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .room-item:hover {
            border-color: var(--blue);
            background: rgba(76, 154, 255, 0.05);
        }
        .room-item.active {
            border-color: var(--blue);
            background: rgba(76, 154, 255, 0.1);
        }
        .room-item h4 {
            font-size: 15px;
            font-weight: 600;
        }
        .room-item .room-id {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .create-room {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
        }
        .create-room input {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            margin-bottom: 8px;
        }
        .create-room input:focus {
            outline: none;
            border-color: var(--blue);
        }
        .create-room button {
            width: 100%;
            padding: 10px;
            background: var(--blue);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .create-room button:hover {
            background: #3d8ee6;
        }

        /* ─── CHAT AREA ─── */
        .chat-area {
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }
        .chat-header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        .chat-header h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .chat-header p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 70%;
        }
        .message.me {
            align-self: flex-end;
            align-items: flex-end;
        }
        .message-sender {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
        }
        .message-bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 16px;
            font-size: 14px;
            line-height: 1.5;
        }
        .message.me .message-bubble {
            background: var(--blue);
            border-color: var(--blue);
            color: #fff;
        }
        .message-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .chat-input-wrapper {
            padding: 20px 28px;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }
        .typing-indicator {
            font-size: 13px;
            color: var(--green);
            padding: 0 0 8px 4px;
            min-height: 24px;
            font-style: italic;
        }
        .typing-indicator .dots {
            display: inline-block;
        }
        .typing-indicator .dots::after {
            content: '...';
            animation: dots 1.4s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        .chat-input-form {
            display: flex;
            gap: 12px;
        }
        .chat-input-form input {
            flex: 1;
            padding: 14px 18px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
        }
        .chat-input-form input:focus {
            outline: none;
            border-color: var(--blue);
        }
        .chat-input-form button {
            padding: 14px 24px;
            background: var(--blue);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-input-form button:hover {
            background: #3d8ee6;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            gap: 12px;
        }
        .empty-state h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }

        /* ─── SCROLLBAR ─── */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- ════════ SIDEBAR ════════ -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>채팅 테스트</h1>
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">연결 대기중...</span>
            </div>
        </div>

        <div class="user-select">
            <label>사용자 선택</label>
            <select id="userSelect">
                <option value="">사용자를 선택하세요</option>
            </select>
        </div>

        <div class="room-list">
            <h3>채팅방</h3>
            <div id="roomList"></div>
        </div>

        <div class="create-room">
            <input type="text" id="roomNameInput" placeholder="새 채팅방 이름..."/>
            <button onclick="createRoom()">채팅방 생성</button>
        </div>
    </div>

    <!-- ════════ CHAT AREA ════════ -->
    <div class="chat-area">
        <div class="chat-header">
            <h2 id="chatTitle">채팅방을 선택해주세요</h2>
            <p id="chatSubtitle">왼쪽에서 채팅방을 선택하거나 새로 만들어보세요</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="empty-state">
                <h3>📭 메시지가 없습니다</h3>
                <p>채팅방을 선택하고 메시지를 보내보세요!</p>
            </div>
        </div>

        <div class="chat-input-wrapper">
            <div class="typing-indicator" id="typingIndicator"></div>
            <form class="chat-input-form" id="chatForm" onsubmit="sendMessage(event)">
                <input type="text" id="messageInput" placeholder="메시지를 입력하세요..." disabled oninput="handleTyping()"/>
                <button type="submit" disabled>전송</button>
            </form>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:8080';
    const WS_URL = 'http://localhost:8080/ws';

    let stompClient = null;
    let currentUserId = null;
    let currentUserName = null;
    let currentRoomId = null;
    let jwtToken = null;
    let rooms = [];
    let users = []; // ← 사용자 목록 저장용 추가
    let currentSubscription = null; // ← 구독 ID 저장용 추가
    let typingSubscription = null; // ← 타이핑 구독 ID
    let typingTimeout = null; // ← 타이핑 타이머
    let typingUsers = new Set(); // ← 현재 입력 중인 사용자들

    // ─────────────────────────────────────────────────────────
    // 초기화
    // ─────────────────────────────────────────────────────────
    async function init() {
        // 사용자 목록 로드
        await loadUsers();

        // 첫 번째 사용자가 있다면 기본 선택
        if (users.length > 0) {
            document.getElementById('userSelect').value = users[0].id;
            await selectUser(users[0].id);
        }

        // 채팅방 목록 로드
        await loadRooms();
    }

    async function loadUsers() {
        try {
            console.log('👥 사용자 목록 요청 중...');
            const response = await fetch(`${API_BASE}/api/users`);
            if (!response.ok) throw new Error('사용자 목록 로드 실패');

            users = await response.json();
            const userSelect = document.getElementById('userSelect');

            // DB의 id와 name(또는 username)으로 option 생성
            userSelect.innerHTML = users.map(user =>
                `<option value="${user.id}">${user.name || user.username || 'User ' + user.id}</option>`
            ).join('');
        } catch (error) {
            console.error('❌ 사용자 목록 로드 실패:', error);
        }
    }

    async function selectUser(userId) {
        try {
            console.log('👤 사용자 선택:', userId);

            // userId만으로 JWT 발급 (비번 불필요, 로컬 테스트용)
            const url = `${API_BASE}/api/jwt/${userId}`;
            console.log('🔑 JWT 요청:', url);

            const response = await fetch(url);
            console.log('🔑 JWT 응답 상태:', response.status);

            if (!response.ok) {
                throw new Error(`JWT 발급 실패: ${response.status}`);
            }

            jwtToken = await response.text();
            currentUserId = userId;
            const selectedUser = users.find(u => u.id == userId);
            currentUserName = selectedUser ? (selectedUser.name || selectedUser.username) : 'Unknown';

            console.log('✅ JWT 발급 완료:', jwtToken.substring(0, 20) + '...');

            connectWebSocket();
        } catch (error) {
            console.error('❌ JWT 발급 실패:', error);
            alert('사용자 인증에 실패했습니다: ' + error.message);
        }
    }

    // ─────────────────────────────────────────────────────────
    // WebSocket 연결
    // ─────────────────────────────────────────────────────────
    function connectWebSocket() {
        console.log('🔌 WebSocket 연결 시도:', WS_URL);
        console.log('🔑 JWT 토큰:', jwtToken ? jwtToken.substring(0, 30) + '...' : 'null');

        const socket = new SockJS(WS_URL);
        stompClient = Stomp.over(socket);

        // 디버그 모드 활성화
        stompClient.debug = function(str) {
            console.log('🔍 STOMP:', str);
        };

        stompClient.connect(
            { Authorization: `Bearer ${jwtToken}` },
            function(frame) {
                console.log('✅ WebSocket 연결 완료:', frame);
                updateStatus(true);
            },
            function(error) {
                console.error('❌ WebSocket 연결 실패:', error);
                updateStatus(false);

                // 재연결 시도
                setTimeout(() => {
                    console.log('🔄 5초 후 재연결 시도...');
                    connectWebSocket();
                }, 5000);
            }
        );
    }

    function updateStatus(connected) {
        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusText');

        if (connected) {
            dot.classList.add('connected');
            text.textContent = `${currentUserName} 연결됨`;
        } else {
            dot.classList.remove('connected');
            text.textContent = '연결 끊김';
        }
    }

    // ─────────────────────────────────────────────────────────
    // 채팅방 관리
    // ─────────────────────────────────────────────────────────
    async function loadRooms() {
        try {
            console.log('📋 채팅방 목록 요청 중...');
            const response = await fetch(`${API_BASE}/api/chat/rooms`);
            console.log('📋 응답 상태:', response.status);

            if (!response.ok) {
                console.error('❌ 응답 실패:', response.status, response.statusText);
                return;
            }

            rooms = await response.json();
            console.log('✅ 채팅방 목록 로드 완료:', rooms);
            renderRooms();
        } catch (error) {
            console.error('❌ 채팅방 목록 로드 실패:', error);
        }
    }

    async function createRoom() {
        const input = document.getElementById('roomNameInput');
        const name = input.value.trim();

        if (!name) {
            alert('채팅방 이름을 입력해주세요');
            return;
        }

        try {
            console.log('🏗️ 채팅방 생성 요청:', name);
            const response = await fetch(`${API_BASE}/api/chat/rooms?name=${encodeURIComponent(name)}`, {
                method: 'POST'
            });
            console.log('🏗️ 응답 상태:', response.status);

            if (!response.ok) {
                console.error('❌ 생성 실패:', response.status, response.statusText);
                alert('채팅방 생성에 실패했습니다.');
                return;
            }

            const room = await response.json();
            console.log('✅ 채팅방 생성 완료:', room);

            // 목록 새로고침
            await loadRooms();
            input.value = '';
        } catch (error) {
            console.error('❌ 채팅방 생성 실패:', error);
            alert('채팅방 생성 중 오류가 발생했습니다: ' + error.message);
        }
    }

    function renderRooms() {
        const container = document.getElementById('roomList');
        container.innerHTML = rooms.map(room => `
    <div class="room-item ${currentRoomId === room.id ? 'active' : ''}" onclick="selectRoom(${room.id}, '${room.name}')">
      <div>
        <h4>${room.name}</h4>
        <div class="room-id">ID: ${room.id}</div>
      </div>
    </div>
  `).join('');
    }

    async function selectRoom(roomId, roomName) {
        // 기존 구독 해제
        if (currentSubscription) {
            console.log('🔴 기존 구독 해제:', currentRoomId);
            currentSubscription.unsubscribe();
            currentSubscription = null;
        }
        if (typingSubscription) {
            typingSubscription.unsubscribe();
            typingSubscription = null;
        }

        currentRoomId = roomId;
        typingUsers.clear();
        updateTypingIndicator();

        // UI 업데이트
        document.getElementById('chatTitle').textContent = roomName;
        document.getElementById('chatSubtitle').textContent = `Room ID: ${roomId}`;
        document.getElementById('messageInput').disabled = false;
        document.querySelector('.chat-input-form button').disabled = false;

        renderRooms();
        clearMessages();

        // 과거 메시지 로드
        await loadPastMessages(roomId);

        // 새 채팅방 구독
        if (stompClient && stompClient.connected) {
            // 메시지 구독
            currentSubscription = stompClient.subscribe(`/sub/chat/${roomId}`, function(message) {
                console.log('📨 메시지 수신:', message.body);
                const data = JSON.parse(message.body);
                displayMessage(data);
            });

            // 타이핑 인디케이터 구독
            typingSubscription = stompClient.subscribe(`/sub/chat/${roomId}/typing`, function(message) {
                const data = JSON.parse(message.body);
                handleTypingIndicator(data);
            });

            console.log('✅ 채팅방', roomId, '구독 시작');
        }
    }

    // ─────────────────────────────────────────────────────────
    // 타이핑 인디케이터
    // ─────────────────────────────────────────────────────────
    function handleTyping() {
        if (!currentRoomId || !stompClient || !stompClient.connected) return;

        // 타이핑 중 신호 전송
        sendTypingStatus(true);

        // 기존 타이머 취소
        if (typingTimeout) {
            clearTimeout(typingTimeout);
        }

        // 2초 후 타이핑 중지 신호 전송
        typingTimeout = setTimeout(() => {
            sendTypingStatus(false);
        }, 2000);
    }

    function sendTypingStatus(isTyping) {
        if (!stompClient || !stompClient.connected || !currentRoomId) return;

        const typingData = {
            roomId: currentRoomId,
            typing: isTyping
        };

        stompClient.send('/pub/chat.typing', {}, JSON.stringify(typingData));
    }

    function handleTypingIndicator(data) {
        // 내가 보낸 타이핑 신호는 무시
        if (data.userId === currentUserId) return;

        if (data.typing) {
            typingUsers.add(data.userName);
        } else {
            typingUsers.delete(data.userName);
        }

        updateTypingIndicator();
    }

    function updateTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');

        if (typingUsers.size === 0) {
            indicator.innerHTML = '';
        } else if (typingUsers.size === 1) {
            const userName = Array.from(typingUsers)[0];
            indicator.innerHTML = `${userName}이 입력 중<span class="dots"></span>`;
        } else {
            indicator.innerHTML = `${typingUsers.size}명이 입력 중<span class="dots"></span>`;
        }
    }

    // ─────────────────────────────────────────────────────────
    // 메시지 전송/수신
    // ─────────────────────────────────────────────────────────
    async function loadPastMessages(roomId) {
        try {
            console.log('📜 과거 메시지 로드 중...', roomId);
            const response = await fetch(`${API_BASE}/api/chat/rooms/${roomId}/messages?size=50`);

            if (!response.ok) {
                console.error('❌ 메시지 로드 실패:', response.status);
                return;
            }

            const messages = await response.json();
            console.log('✅ 과거 메시지 로드 완료:', messages.length, '개');

            // 메시지를 시간순으로 정렬 (오래된 것부터)
            messages.sort((a, b) => {
                const dateA = new Date(a.createdAt);
                const dateB = new Date(b.createdAt);
                return dateA - dateB;
            });

            // 메시지를 순서대로 표시
            messages.forEach(msg => {
                displayPastMessage(msg);
            });

            // 스크롤을 맨 아래로
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        } catch (error) {
            console.error('❌ 과거 메시지 로드 실패:', error);
        }
    }

    function sendMessage(event) {
        event.preventDefault();

        const input = document.getElementById('messageInput');
        const content = input.value.trim();

        if (!content || !currentRoomId) return;

        const message = {
            roomId: currentRoomId,
            content: content
        };

        stompClient.send('/pub/chat.send', {}, JSON.stringify(message));
        input.value = '';

        // 타이핑 중지 신호 전송
        sendTypingStatus(false);
        if (typingTimeout) {
            clearTimeout(typingTimeout);
            typingTimeout = null;
        }

        console.log('메시지 전송:', message);
    }

    function displayMessage(data) {
        const container = document.getElementById('chatMessages');

        // empty state 제거
        const emptyState = container.querySelector('.empty-state');
        if (emptyState) {
            emptyState.remove();
        }

        const isMe = data.senderId === currentUserId;
        const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isMe ? 'me' : ''}`;
        messageDiv.innerHTML = `
    <div class="message-sender">${data.senderName}</div>
    <div class="message-bubble">${escapeHtml(data.content)}</div>
    <div class="message-time">${time}</div>
  `;

        container.appendChild(messageDiv);
        container.scrollTop = container.scrollHeight;
    }

    function displayPastMessage(data) {
        const container = document.getElementById('chatMessages');

        // empty state 제거
        const emptyState = container.querySelector('.empty-state');
        if (emptyState) {
            emptyState.remove();
        }

        const isMe = data.senderId === currentUserId;

        // createdAt 필드를 사용하여 시간 표시
        let time = '오후 00:00';
        if (data.createdAt) {
            const date = new Date(data.createdAt);
            time = date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
        }

        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isMe ? 'me' : ''}`;
        messageDiv.innerHTML = `
    <div class="message-sender">${data.senderName}</div>
    <div class="message-bubble">${escapeHtml(data.content)}</div>
    <div class="message-time">${time}</div>
  `;

        container.appendChild(messageDiv);
    }

    function clearMessages() {
        const container = document.getElementById('chatMessages');
        container.innerHTML = `
    <div class="empty-state">
      <h3>📭 메시지가 없습니다</h3>
      <p>채팅방을 선택하고 메시지를 보내보세요!</p>
    </div>
  `;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ─────────────────────────────────────────────────────────
    // 사용자 변경
    // ─────────────────────────────────────────────────────────
    document.getElementById('userSelect').addEventListener('change', async function(e) {
        const userId = parseInt(e.target.value);

        // 기존 구독 해제
        if (currentSubscription) {
            currentSubscription.unsubscribe();
            currentSubscription = null;
        }
        if (typingSubscription) {
            typingSubscription.unsubscribe();
            typingSubscription = null;
        }

        // 기존 연결 끊기
        if (stompClient) {
            stompClient.disconnect();
        }

        // 새 사용자로 재연결
        await selectUser(userId);
        currentRoomId = null;
        typingUsers.clear();
        clearMessages();

        // 채팅방 목록 새로고침
        await loadRooms();

        document.getElementById('messageInput').disabled = true;
        document.querySelector('.chat-input-form button').disabled = true;
    });

    // ─────────────────────────────────────────────────────────
    // 시작
    // ─────────────────────────────────────────────────────────
    init();
</script>

</body>
</html>
